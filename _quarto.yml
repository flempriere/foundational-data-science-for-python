project:
  type: website
  render:
    - "*.qmd"
  post-render: quarto/scripts/restoreMarkdownToHeirarchy.sh
  #resources:

website:
  title: "Effective Python: Notes"
  page-navigation: true
  open-graph: true
  navbar:
    search: true
    left:
      - href: index.qmd
        text: Home
  sidebar:
    style: "docked"
    collapse-level: 1
    search: true
    contents:
      - Chapter_01/Chapter_01.qmd
      - Chapter_02/Chapter_02.qmd
      - Chapter_03/Chapter_03.qmd

format:
  html:
    code-fold: false
    code-links:
      - repo
      - binder
  gfm:
    filters:
      - quarto/scripts/strip_ansi.lua
  ipynb: default
toc: true
toc-depth: 6
format-links: false
execute:
  enabled: true
  error: true
engine: jupyter
